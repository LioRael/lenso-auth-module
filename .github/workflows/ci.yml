name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout auth module
        uses: actions/checkout@v4
        with:
          path: lenso-auth-module

      - name: Checkout runtime console API
        uses: actions/checkout@v4
        with:
          repository: LioRael/lenso-runtime-console
          path: lenso-runtime-console

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.94.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: lenso-auth-module/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: lenso-auth-module

      - name: Check Rust
        run: |
          cargo fmt --all --check
          cargo test --locked -p lenso-module-auth -p lenso-module-auth-password
        working-directory: lenso-auth-module

      - name: Check console package
        run: pnpm check
        working-directory: lenso-auth-module

      - name: Check npm package
        run: npm pack --dry-run --registry https://registry.npmjs.org/
        working-directory: lenso-auth-module/packages/auth-console
