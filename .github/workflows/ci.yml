name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout auth module
        uses: actions/checkout@v4
        with:
          path: lenso-auth-module

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        run: corepack enable

      - name: Install npm dependencies
        run: pnpm install --frozen-lockfile
        working-directory: lenso-auth-module

      - name: Check Rust
        run: |
          cargo fmt --all --check
          cargo test --locked --workspace
        working-directory: lenso-auth-module

      - name: Check npm packages
        run: |
          set -eu
          for package_dir in auth-console auth-device-console auth-provider-console; do
            (
              cd "packages/$package_dir"
              npm pack --dry-run --registry https://registry.npmjs.org/
            )
          done
        working-directory: lenso-auth-module
