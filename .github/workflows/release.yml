name: Release

on:
  workflow_dispatch:
    inputs:
      publish_auth_crate:
        description: Publish lenso-module-auth to crates.io
        required: true
        default: true
        type: boolean
      publish_password_crate:
        description: Publish lenso-module-auth-password to crates.io
        required: true
        default: true
        type: boolean
      publish_npm:
        description: Publish Runtime Console npm packages
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    environment: release
    env:
      HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
    steps:
      - name: Checkout auth module
        uses: actions/checkout@v4
        with:
          path: lenso-auth-module

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Setup pnpm
        run: corepack enable

      - name: Install npm dependencies
        run: pnpm install --frozen-lockfile
        working-directory: lenso-auth-module

      - name: Verify
        run: |
          cargo fmt --all --check
          cargo test --locked -p lenso-module-auth -p lenso-module-auth-password
        working-directory: lenso-auth-module

      - name: Verify npm packages
        run: |
          set -eu
          for package_dir in auth-console auth-device-console auth-provider-console; do
            (
              cd "packages/$package_dir"
              npm pack --dry-run --registry https://registry.npmjs.org/
            )
          done
        working-directory: lenso-auth-module

      - name: Publish Rust crates
        if: ${{ inputs.publish_auth_crate || inputs.publish_password_crate }}
        run: |
          set -eu
          test -n "$CARGO_REGISTRY_TOKEN" || { echo "CARGO_REGISTRY_TOKEN is required when publishing Rust crates" >&2; exit 1; }

          crate_version() {
            cargo pkgid -p "$1" | sed 's/.*#//' | sed 's/.*@//'
          }

          crate_version_exists() {
            crate="$1"
            version="$2"
            curl -A 'lenso-auth-release-publish' -fsS \
              "https://crates.io/api/v1/crates/$crate/$version" >/dev/null 2>&1
          }

          publish_crate() {
            crate="$1"
            version="$(crate_version "$crate")"
            if crate_version_exists "$crate" "$version"; then
              echo "$crate $version is already on crates.io; skipping."
            else
              cargo publish -p "$crate"
            fi
          }

          if [ "$PUBLISH_AUTH_CRATE" = "true" ]; then
            publish_crate lenso-module-auth
          fi

          if [ "$PUBLISH_AUTH_CRATE" = "true" ] && [ "$PUBLISH_PASSWORD_CRATE" = "true" ]; then
            sleep 90
          fi

          if [ "$PUBLISH_PASSWORD_CRATE" = "true" ]; then
            publish_crate lenso-module-auth-password
          fi
        working-directory: lenso-auth-module
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          PUBLISH_AUTH_CRATE: ${{ inputs.publish_auth_crate }}
          PUBLISH_PASSWORD_CRATE: ${{ inputs.publish_password_crate }}

      - name: Publish console packages
        if: ${{ inputs.publish_npm }}
        run: |
          set -eu

          package_name() {
            package_dir="$1"
            node -p "require('./packages/$package_dir/package.json').name"
          }

          package_version() {
            package_dir="$1"
            node -p "require('./packages/$package_dir/package.json').version"
          }

          version_exists() {
            package_dir="$1"
            name="$(package_name "$package_dir")"
            version="$(package_version "$package_dir")"
            if npm view "$name@$version" version --registry https://registry.npmjs.org/ >/dev/null 2>&1; then
              return 0
            fi
            return 1
          }

          publish_with_token() {
            package_dir="$1"
            (cd "packages/$package_dir" && npm publish --access public --registry https://registry.npmjs.org/)
          }

          publish_with_trusted_publishing() {
            package_dir="$1"
            tmp_npmrc="$(mktemp)"
            printf 'registry=https://registry.npmjs.org/\n' > "$tmp_npmrc"
            (
              cd "packages/$package_dir"
              NPM_CONFIG_USERCONFIG="$tmp_npmrc" npm publish --access public --registry https://registry.npmjs.org/ --provenance
            )
            rm -f "$tmp_npmrc"
          }

          publish_package() {
            package_dir="$1"
            name="$(package_name "$package_dir")"
            version="$(package_version "$package_dir")"
            if version_exists "$package_dir"; then
              echo "$name@$version is already on npm; skipping."
              return 0
            fi

            if [ "${HAS_NPM_TOKEN:-}" = "true" ]; then
              if publish_with_token "$package_dir"; then
                return 0
              fi
              echo "::warning::$name@$version did not publish with NPM_TOKEN; retrying with trusted publishing."
            fi

            publish_with_trusted_publishing "$package_dir"
          }

          publish_package auth-console
          publish_package auth-device-console
          publish_package auth-provider-console
        working-directory: lenso-auth-module
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
